version: "3.9"

services:
  api:
    build: .
    container_name: essential-open-api
    ports:
      - "5100:5100"
    volumes:
      - .:/app
    environment:
      FLASK_APP: wsgi.py
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: "5100"
      FLASK_DEBUG: "1"
      PPRJ_FILE: "/app/resources/essential_baseline_6_20.pprj"
      JARS_DIR: "/app/jars"
      PPRJ_DIR: "/app/resources"

    command: flask run --debug
